<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which Lily Are You?</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:     #141920;
    --surface: #1c2530;
    --border:  #2a3a4a;
    --muted:   #3a4f62;
    --subtle:  #5a7a8a;
    --body:    #b8cdd8;
    --bright:  #e2edf2;
    --teal:    #4ecdc4;
    --teal2:   #2ab5ab;
    --teal-dim: rgba(78,205,196,0.12);
    --glow:    rgba(78,205,196,0.18);
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--body);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── decorative background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 55% 40% at 5% 15%, rgba(78,205,196,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 45% 55% at 95% 85%, rgba(78,205,196,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 35% 35% at 50% 50%, rgba(30,60,80,0.4) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── petals bg ── */
  .petal {
    position: fixed;
    pointer-events: none;
    opacity: 0;
    animation: fall linear infinite;
    z-index: 0;
    font-size: 1.2rem;
    filter: hue-rotate(160deg) brightness(0.7);
  }
  @keyframes fall {
    0%   { transform: translateY(-60px) rotate(0deg); opacity: 0; }
    10%  { opacity: 0.25; }
    90%  { opacity: 0.1; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  /* ── wrapper ── */
  .wrap {
    position: relative;
    z-index: 1;
    max-width: 680px;
    margin: 0 auto;
    padding: 60px 24px 100px;
  }

  /* ── header ── */
  header {
    text-align: center;
    margin-bottom: 64px;
    animation: fadeUp 1s ease both;
  }
  .subtitle {
    font-family: 'Jost', sans-serif;
    font-weight: 200;
    font-size: 0.78rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 16px;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2.8rem, 8vw, 4.5rem);
    font-weight: 300;
    line-height: 1.1;
    color: var(--bright);
    margin-bottom: 20px;
  }
  h1 em {
    font-style: italic;
    color: var(--teal);
  }
  .tagline {
    font-size: 0.9rem;
    color: var(--subtle);
    letter-spacing: 0.04em;
    line-height: 1.7;
  }
  .divider {
    display: flex;
    align-items: center;
    gap: 16px;
    margin: 28px auto 0;
    max-width: 260px;
  }
  .divider span { flex: 1; height: 1px; background: var(--border); }
  .divider i { color: var(--teal); font-style: normal; font-size: 1rem; opacity: 0.7; }

  /* ── progress ── */
  #progress-wrap {
    margin-bottom: 40px;
    animation: fadeUp 0.8s 0.2s ease both;
  }
  .prog-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }
  .prog-bar {
    height: 2px;
    background: var(--surface);
    border-radius: 2px;
    overflow: hidden;
  }
  .prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--teal2), var(--teal));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(.4,0,.2,1);
    width: 0%;
    box-shadow: 0 0 8px var(--glow);
  }

  /* ── question card ── */
  .question-block {
    display: none;
    animation: fadeUp 0.6s ease both;
  }
  .question-block.active { display: block; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .q-number {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--teal);
    opacity: 0.8;
    margin-bottom: 12px;
  }
  .q-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.35rem, 4vw, 1.75rem);
    font-weight: 400;
    line-height: 1.45;
    color: var(--bright);
    margin-bottom: 32px;
  }

  /* ── options ── */
  .options { display: grid; gap: 12px; }
  .option {
    display: flex;
    align-items: flex-start;
    gap: 16px;
    padding: 18px 22px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    cursor: pointer;
    transition: all 0.25s ease;
  }
  .option:hover {
    border-color: var(--teal);
    background: var(--teal-dim);
    transform: translateX(4px);
    box-shadow: -3px 0 0 var(--teal);
  }
  .option.selected {
    border-color: var(--teal);
    background: var(--teal-dim);
    box-shadow: -3px 0 0 var(--teal);
  }
  .opt-letter {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: var(--teal);
    min-width: 20px;
    margin-top: 1px;
    opacity: 0.8;
  }
  .opt-text {
    font-size: 0.9rem;
    line-height: 1.6;
    color: var(--body);
  }

  /* ── nav btns ── */
  .btn-wrap { margin-top: 36px; display: flex; justify-content: space-between; align-items: center; }
  .btn-prev {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 0.78rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 10px 0;
    cursor: pointer;
    transition: color 0.2s ease;
  }
  .btn-prev:hover { color: var(--body); }
  .btn-next {
    background: transparent;
    border: 1px solid var(--teal);
    color: var(--teal);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 0.8rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 14px 36px;
    cursor: pointer;
    border-radius: 2px;
    opacity: 0;
    pointer-events: none;
    transition: all 0.3s ease;
  }
  .btn-next.visible {
    opacity: 1;
    pointer-events: all;
  }
  .btn-next:hover {
    background: var(--teal);
    color: var(--bg);
    transform: translateY(-2px);
    box-shadow: 0 8px 24px var(--glow);
  }

  /* ── result ── */
  #result {
    display: none;
    animation: fadeUp 0.8s ease both;
  }
  #result.show { display: block; }

  .result-card {
    border: 1px solid var(--border);
    border-radius: 6px;
    overflow: hidden;
    background: var(--surface);
  }
  .result-header {
    padding: 48px 40px 36px;
    background: linear-gradient(135deg, rgba(78,205,196,0.08), rgba(20,40,55,0.6));
    border-bottom: 1px solid var(--border);
    text-align: center;
  }
  .result-lily-icon {
    font-size: 3rem;
    margin-bottom: 16px;
    display: block;
    filter: drop-shadow(0 4px 16px rgba(78,205,196,0.35));
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-8px); }
  }
  .result-label {
    font-size: 0.72rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--subtle);
    margin-bottom: 10px;
  }
  .result-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(2rem, 7vw, 3rem);
    font-weight: 400;
    color: var(--bright);
    margin-bottom: 6px;
  }
  .result-name em { font-style: italic; color: var(--teal); }
  .result-tagline {
    font-size: 0.82rem;
    color: var(--subtle);
    letter-spacing: 0.06em;
    font-style: italic;
  }
  .result-body { padding: 36px 40px; }
  .result-desc {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 300;
    line-height: 1.8;
    color: var(--body);
    margin-bottom: 28px;
  }
  .result-traits {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 32px;
  }
  .trait {
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    color: var(--subtle);
    background: rgba(78,205,196,0.05);
  }
  .btn-retry {
    display: inline-block;
    background: transparent;
    border: 1px solid var(--muted);
    color: var(--subtle);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 0.78rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 13px 32px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.3s ease;
  }
  .btn-retry:hover {
    border-color: var(--teal);
    color: var(--teal);
    transform: translateY(-2px);
  }

  /* ── share ── */
  .share-section { margin-bottom: 32px; }
  .share-label {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }
  .share-btns { display: flex; flex-wrap: wrap; gap: 10px; }
  .btn-share {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: transparent;
    border: 1px solid var(--teal);
    color: var(--teal);
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 0.75rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 11px 24px;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.25s ease;
    text-decoration: none;
  }
  .btn-share:hover {
    background: var(--teal);
    color: var(--bg);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px var(--glow);
  }
  .btn-share svg { width: 14px; height: 14px; fill: currentColor; flex-shrink: 0; }

  /* ── mobile ── */
  @media (max-width: 500px) {
    .result-header { padding: 36px 24px 28px; }
    .result-body   { padding: 28px 24px; }
  }
</style>
</head>
<body>

<!-- falling petals -->
<div class="petal" style="left:5%;animation-duration:12s;animation-delay:0s;font-size:1rem;">✿</div>
<div class="petal" style="left:20%;animation-duration:15s;animation-delay:3s;">🌸</div>
<div class="petal" style="left:40%;animation-duration:11s;animation-delay:6s;font-size:0.9rem;">✾</div>
<div class="petal" style="left:65%;animation-duration:14s;animation-delay:1s;">❀</div>
<div class="petal" style="left:80%;animation-duration:13s;animation-delay:8s;font-size:0.85rem;">✿</div>
<div class="petal" style="left:92%;animation-duration:16s;animation-delay:4s;">✾</div>

<div class="wrap">
  <header>
    <p class="subtitle">A little personality quiz</p>
    <h1>if you were a<br><em>lily</em>, which<br>would you be?</h1>
    <p class="tagline">sixteen questions about how you move through the world —<br>and we'll find the lily that blooms like you do.</p>
    <div class="divider"><span></span><i>✿</i><span></span></div>
  </header>

  <div id="progress-wrap">
    <div class="prog-label">
      <span id="prog-text">question 1 of 7</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="prog-bar"><div class="prog-fill" id="prog-fill"></div></div>
  </div>

  <!-- QUESTIONS -->
  <div id="questions"></div>

  <!-- RESULT -->
  <div id="result"></div>
</div>

<script>
const questions = [
  {
    text: "it's a quiet afternoon and you have it all to yourself. what does that look like?",
    options: [
      { letter: "a", text: "curled up somewhere cozy, deep in a book or your own thoughts", scores: { stargazer: 1, calla: 2, tiger: 0, white: 2, water: 1, spider: 0, valley: 3 } },
      { letter: "b", text: "out somewhere — exploring, walking, finding something new", scores: { stargazer: 1, calla: 0, tiger: 3, white: 0, water: 2, spider: 2, valley: 0 } },
      { letter: "c", text: "working on something — a project, a craft, anything with your hands", scores: { stargazer: 2, calla: 1, tiger: 1, white: 0, water: 2, spider: 1, valley: 1 } },
      { letter: "d", text: "doing absolutely nothing on purpose. rest is productive too.", scores: { stargazer: 0, calla: 2, tiger: 0, white: 3, water: 1, spider: 0, valley: 2 } },
    ]
  },
  {
    text: "someone you care about is going through something hard. your instinct is to—",
    options: [
      { letter: "a", text: "show up. no questions asked. just be there.", scores: { stargazer: 1, calla: 1, tiger: 0, white: 3, water: 2, spider: 0, valley: 3 } },
      { letter: "b", text: "figure out what they actually need and do that specific thing", scores: { stargazer: 2, calla: 2, tiger: 0, white: 1, water: 1, spider: 1, valley: 1 } },
      { letter: "c", text: "give them space but check in quietly so they know you're around", scores: { stargazer: 1, calla: 3, tiger: 0, white: 1, water: 2, spider: 2, valley: 1 } },
      { letter: "d", text: "distract them — plans, jokes, adventures. grief doesn't sit well with you.", scores: { stargazer: 0, calla: 0, tiger: 3, white: 0, water: 1, spider: 3, valley: 0 } },
    ]
  },
  {
    text: "how do you feel walking into a room full of people you don't know?",
    options: [
      { letter: "a", text: "honestly kind of lit — you love meeting people", scores: { stargazer: 3, calla: 0, tiger: 2, white: 0, water: 1, spider: 1, valley: 1 } },
      { letter: "b", text: "fine. you'll find one interesting person and talk to them all night", scores: { stargazer: 1, calla: 2, tiger: 1, white: 1, water: 2, spider: 2, valley: 1 } },
      { letter: "c", text: "quiet at first. warm up slowly but then you're fully there", scores: { stargazer: 0, calla: 1, tiger: 0, white: 3, water: 2, spider: 0, valley: 3 } },
      { letter: "d", text: "mildly exhausted in advance but you'll manage and forget you were worried", scores: { stargazer: 0, calla: 3, tiger: 0, white: 1, water: 2, spider: 1, valley: 2 } },
    ]
  },
  {
    text: "when you love something — a show, a song, a game — you tend to—",
    options: [
      { letter: "a", text: "go deep. lore, theory, every detail. you want to understand it completely.", scores: { stargazer: 2, calla: 1, tiger: 0, white: 0, water: 3, spider: 2, valley: 0 } },
      { letter: "b", text: "share it immediately. drag everyone you know into it.", scores: { stargazer: 3, calla: 0, tiger: 2, white: 0, water: 0, spider: 0, valley: 2 } },
      { letter: "c", text: "keep it close. it's yours. you don't need to explain it.", scores: { stargazer: 0, calla: 3, tiger: 0, white: 2, water: 1, spider: 3, valley: 1 } },
      { letter: "d", text: "enjoy it quietly and let it just... exist in your life.", scores: { stargazer: 0, calla: 1, tiger: 0, white: 3, water: 2, spider: 0, valley: 3 } },
    ]
  },
  {
    text: "what does getting angry look like for you?",
    options: [
      { letter: "a", text: "you don't hide it — you go quiet and people can feel it", scores: { stargazer: 1, calla: 3, tiger: 0, white: 2, water: 1, spider: 3, valley: 0 } },
      { letter: "b", text: "you say what you think, directly, and then it's over", scores: { stargazer: 2, calla: 0, tiger: 3, white: 0, water: 1, spider: 1, valley: 0 } },
      { letter: "c", text: "you let it simmer, think about it, and bring it up carefully later", scores: { stargazer: 1, calla: 2, tiger: 0, white: 1, water: 3, spider: 1, valley: 2 } },
      { letter: "d", text: "you rarely get angry — mostly just tired or disappointed", scores: { stargazer: 0, calla: 1, tiger: 0, white: 3, water: 2, spider: 0, valley: 3 } },
    ]
  },
  {
    text: "your closest friends would describe you as—",
    options: [
      { letter: "a", text: "the one who shows up. reliable, steady, quietly essential.", scores: { stargazer: 0, calla: 1, tiger: 0, white: 3, water: 2, spider: 0, valley: 3 } },
      { letter: "b", text: "surprising — people think they know you and then you show them something new", scores: { stargazer: 1, calla: 0, tiger: 2, white: 0, water: 3, spider: 3, valley: 0 } },
      { letter: "c", text: "intense in the best way — real conversations only, no small talk", scores: { stargazer: 3, calla: 2, tiger: 0, white: 0, water: 1, spider: 2, valley: 0 } },
      { letter: "d", text: "genuinely funny, hard to read, but when you're in — you're fully in", scores: { stargazer: 0, calla: 3, tiger: 1, white: 1, water: 1, spider: 2, valley: 1 } },
    ]
  },
  {
    text: "what's your relationship with change?",
    options: [
      { letter: "a", text: "you adapt fast — new environment, new you. almost too easy.", scores: { stargazer: 2, calla: 0, tiger: 3, white: 0, water: 1, spider: 2, valley: 0 } },
      { letter: "b", text: "you resist it at first, then commit completely once you've decided", scores: { stargazer: 1, calla: 2, tiger: 0, white: 2, water: 2, spider: 1, valley: 2 } },
      { letter: "c", text: "you're the one who usually initiates it. stagnation doesn't sit well with you.", scores: { stargazer: 3, calla: 0, tiger: 2, white: 0, water: 1, spider: 3, valley: 0 } },
      { letter: "d", text: "you observe it first. slow to move but when you do, it's deliberate and final.", scores: { stargazer: 0, calla: 3, tiger: 0, white: 1, water: 3, spider: 0, valley: 3 } },
    ]
  },
  {
    text: "someone asks for your honest opinion on something they made. you—",
    options: [
      { letter: "a", text: "tell them the truth, gently but fully. they asked.", scores: { stargazer: 2, calla: 2, tiger: 1, white: 1, water: 2, spider: 1, valley: 2 } },
      { letter: "b", text: "lead with what works, then ease into what doesn't", scores: { stargazer: 1, calla: 1, tiger: 0, white: 3, water: 1, spider: 0, valley: 3 } },
      { letter: "c", text: "say exactly what you think. sugar-coating doesn't help anyone.", scores: { stargazer: 3, calla: 1, tiger: 3, white: 0, water: 0, spider: 2, valley: 0 } },
      { letter: "d", text: "ask what kind of feedback they want before giving any", scores: { stargazer: 0, calla: 3, tiger: 0, white: 2, water: 3, spider: 1, valley: 1 } },
    ]
  },
  {
    text: "how do you feel about being needed by people?",
    options: [
      { letter: "a", text: "it means something to you. you show up when it matters.", scores: { stargazer: 1, calla: 0, tiger: 0, white: 3, water: 1, spider: 0, valley: 3 } },
      { letter: "b", text: "you like it but you need room to breathe too", scores: { stargazer: 2, calla: 2, tiger: 1, white: 1, water: 2, spider: 1, valley: 1 } },
      { letter: "c", text: "it's complicated. you'll always help but needing isn't the same as wanting.", scores: { stargazer: 0, calla: 3, tiger: 0, white: 0, water: 3, spider: 3, valley: 0 } },
      { letter: "d", text: "you'd do anything for the right people. anything.", scores: { stargazer: 3, calla: 0, tiger: 2, white: 2, water: 0, spider: 1, valley: 2 } },
    ]
  },
  {
    text: "your relationship with silence is—",
    options: [
      { letter: "a", text: "comfortable. you don't need to fill every moment.", scores: { stargazer: 0, calla: 3, tiger: 0, white: 2, water: 3, spider: 2, valley: 1 } },
      { letter: "b", text: "you fill it — music, talking, something. silence feels like a void.", scores: { stargazer: 2, calla: 0, tiger: 3, white: 0, water: 0, spider: 1, valley: 1 } },
      { letter: "c", text: "you live in it. most of your best thinking happens there.", scores: { stargazer: 1, calla: 2, tiger: 0, white: 1, water: 3, spider: 3, valley: 2 } },
      { letter: "d", text: "you're fine either way — whatever the moment calls for", scores: { stargazer: 1, calla: 1, tiger: 1, white: 3, water: 1, spider: 0, valley: 3 } },
    ]
  },
  {
    text: "when you meet someone new, they usually notice—",
    options: [
      { letter: "a", text: "that you're warm and easy to talk to right away", scores: { stargazer: 3, calla: 0, tiger: 2, white: 2, water: 0, spider: 0, valley: 3 } },
      { letter: "b", text: "that you're hard to read but clearly interesting", scores: { stargazer: 0, calla: 3, tiger: 0, white: 0, water: 2, spider: 3, valley: 0 } },
      { letter: "c", text: "that you ask more questions than you answer", scores: { stargazer: 1, calla: 1, tiger: 0, white: 1, water: 3, spider: 1, valley: 2 } },
      { letter: "d", text: "that there's something about you they can't quite place", scores: { stargazer: 1, calla: 1, tiger: 1, white: 0, water: 1, spider: 3, valley: 1 } },
    ]
  },
  {
    text: "a plan falls apart last minute. your response is—",
    options: [
      { letter: "a", text: "pivot immediately. you already have three alternatives.", scores: { stargazer: 2, calla: 0, tiger: 3, white: 0, water: 1, spider: 2, valley: 0 } },
      { letter: "b", text: "honestly relieved. you didn't really want to go anyway.", scores: { stargazer: 0, calla: 2, tiger: 0, white: 2, water: 2, spider: 1, valley: 1 } },
      { letter: "c", text: "frustrated, but you take a breath and figure it out quietly", scores: { stargazer: 1, calla: 2, tiger: 0, white: 1, water: 3, spider: 1, valley: 2 } },
      { letter: "d", text: "immediately suggest something better and get everyone on board", scores: { stargazer: 3, calla: 0, tiger: 2, white: 1, water: 0, spider: 1, valley: 2 } },
    ]
  },
  {
    text: "what do you think people misunderstand about you most?",
    options: [
      { letter: "a", text: "that your quietness means you're not paying attention — you catch everything", scores: { stargazer: 0, calla: 2, tiger: 0, white: 1, water: 3, spider: 3, valley: 1 } },

let current = 0;
let scores = { stargazer: 0, calla: 0, tiger: 0, white: 0, water: 0, spider: 0, valley: 0 };
let answers = new Array(questions.length).fill(null);

function render() {
  const container = document.getElementById('questions');
  container.innerHTML = '';
  questions.forEach((q, qi) => {
    const block = document.createElement('div');
    block.className = 'question-block' + (qi === current ? ' active' : '');
    block.id = 'q' + qi;
    block.innerHTML = `
      <p class="q-number">question ${qi+1} of ${questions.length}</p>
      <p class="q-text">${q.text}</p>
      <div class="options">
        ${q.options.map((opt, oi) => `
          <div class="option${answers[qi] === oi ? ' selected' : ''}" data-q="${qi}" data-o="${oi}">
            <span class="opt-letter">${opt.letter}</span>
            <span class="opt-text">${opt.text}</span>
          </div>
        `).join('')}
      </div>
      <div class="btn-wrap">
        ${qi > 0 ? `<button class="btn-prev" data-q="${qi}">← back</button>` : '<span></span>'}
        ${qi === questions.length - 1 && answers[qi] !== null
          ? `<button class="btn-next visible" data-q="${qi}">see my result →</button>`
          : '<span></span>'}
      </div>
    `;
    container.appendChild(block);
  });
  updateProgress();
  attachListeners();
}

function attachListeners() {
  document.querySelectorAll('.option').forEach(el => {
    el.addEventListener('click', () => {
      const qi = parseInt(el.dataset.q);
      const oi = parseInt(el.dataset.o);
      answers[qi] = oi;
      document.querySelectorAll(`[data-q="${qi}"].option`).forEach(o => o.classList.remove('selected'));
      el.classList.add('selected');

      // auto-advance after short delay
      setTimeout(() => {
        if (qi < questions.length - 1) {
          current = qi + 1;
          render();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } else {
          // last question — show the result button instead of auto-finishing
          render();
        }
      }, 380);
    });
  });

  document.querySelectorAll('.btn-prev').forEach(btn => {
    btn.addEventListener('click', () => {
      const qi = parseInt(btn.dataset.q);
      if (qi > 0) {
        current = qi - 1;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    });
  });

  document.querySelectorAll('.btn-next').forEach(btn => {
    btn.addEventListener('click', () => {
      const qi = parseInt(btn.dataset.q);
      if (answers[qi] !== null) showResult();
    });
  });
}

function updateProgress() {
  const answered = answers.filter(a => a !== null).length;
  const pct = Math.round((answered / questions.length) * 100);
  document.getElementById('prog-text').textContent = `question ${current+1} of ${questions.length}`;
  document.getElementById('prog-pct').textContent = pct + '%';
  document.getElementById('prog-fill').style.width = pct + '%';
}

function showResult() {
  // tally scores
  scores = { stargazer: 0, calla: 0, tiger: 0, white: 0, water: 0, spider: 0, valley: 0 };
  questions.forEach((q, qi) => {
    if (answers[qi] !== null) {
      const s = q.options[answers[qi]].scores;
      Object.keys(s).forEach(k => scores[k] += s[k]);
    }
  });

  const winner = Object.keys(scores).reduce((a, b) => scores[a] > scores[b] ? a : b);
  const r = results[winner];

  document.getElementById('questions').style.display = 'none';
  document.getElementById('progress-wrap').style.display = 'none';

  const resultEl = document.getElementById('result');
  resultEl.innerHTML = `
    <div class="result-card">
      <div class="result-header">
        <span class="result-lily-icon">${r.icon}</span>
        <p class="result-label">you are a</p>
        <h2 class="result-name"><em>${r.name}</em></h2>
        <p class="result-tagline">${r.tagline}</p>
      </div>
      <div class="result-body">
        <p class="result-desc">${r.desc}</p>
        <div class="result-traits">
          ${r.traits.map(t => `<span class="trait">${t}</span>`).join('')}
        </div>
        <div class="share-section">
          <p class="share-label">share your result</p>
          <div class="share-btns">
            <button class="btn-share" id="btn-share-native" onclick="shareResult('${winner}')">
              <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92-1.31-2.92-2.92-2.92z"/></svg>
              share
            </button>
          </div>
        </div>
        <button class="btn-retry" onclick="restart()">take it again ↺</button>
      </div>
    </div>
  `;
  resultEl.classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function shareResult(winnerId) {
  const r = results[winnerId];

  // ── draw the share card on canvas ──
  const W = 720, H = 1080;
  const canvas = document.createElement('canvas');
  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');

  const PAD = 64;

  // background
  const bg = ctx.createLinearGradient(0, 0, W, H);
  bg.addColorStop(0, '#141920');
  bg.addColorStop(1, '#1a2530');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // teal glow top-left
  const g1 = ctx.createRadialGradient(60, 100, 0, 60, 100, 380);
  g1.addColorStop(0, 'rgba(78,205,196,0.12)');
  g1.addColorStop(1, 'rgba(78,205,196,0)');
  ctx.fillStyle = g1; ctx.fillRect(0, 0, W, H);

  // teal glow bottom-right
  const g2 = ctx.createRadialGradient(W - 60, H - 100, 0, W - 60, H - 100, 380);
  g2.addColorStop(0, 'rgba(78,205,196,0.08)');
  g2.addColorStop(1, 'rgba(78,205,196,0)');
  ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);

  // border
  ctx.strokeStyle = '#2a3a4a';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(32, 32, W - 64, H - 64);

  // icon — draw a glowing teal circle instead of emoji
  const cx = W / 2, iy = 140;
  const gIcon = ctx.createRadialGradient(cx, iy, 0, cx, iy, 48);
  gIcon.addColorStop(0, 'rgba(78,205,196,0.25)');
  gIcon.addColorStop(1, 'rgba(78,205,196,0)');
  ctx.fillStyle = gIcon;
  ctx.beginPath(); ctx.arc(cx, iy, 48, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = 'rgba(78,205,196,0.6)';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.arc(cx, iy, 32, 0, Math.PI * 2); ctx.stroke();
  // inner dot
  ctx.fillStyle = '#4ecdc4';
  ctx.beginPath(); ctx.arc(cx, iy, 6, 0, Math.PI * 2); ctx.fill();

  // "you are a"
  ctx.textAlign = 'center';
  ctx.font = '300 18px sans-serif';
  ctx.fillStyle = '#4a6a7a';
  ctx.letterSpacing = '4px';
  ctx.fillText('YOU ARE A', W / 2, 220);

  // lily name — scale down if too wide
  ctx.fillStyle = '#4ecdc4';
  ctx.letterSpacing = '0px';
  let nameFontSize = 68;
  ctx.font = `italic 300 ${nameFontSize}px Georgia, serif`;
  while (ctx.measureText(r.name).width > W - PAD * 2 && nameFontSize > 36) {
    nameFontSize -= 2;
    ctx.font = `italic 300 ${nameFontSize}px Georgia, serif`;
  }
  ctx.fillText(r.name, W / 2, 300);

  // tagline — scale down if too wide
  ctx.fillStyle = '#4a6a7a';
  let tagSize = 20;
  ctx.font = `300 ${tagSize}px sans-serif`;
  ctx.letterSpacing = '1px';
  while (ctx.measureText(r.tagline).width > W - PAD * 2 && tagSize > 13) {
    tagSize -= 1;
    ctx.font = `300 ${tagSize}px sans-serif`;
  }
  ctx.fillText(r.tagline, W / 2, 345);

  // divider
  ctx.strokeStyle = '#2a3a4a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W / 2 - 80, 375); ctx.lineTo(W / 2 + 80, 375);
  ctx.stroke();

  // description — word wrap with proper padding
  ctx.font = '300 19px Georgia, serif';
  ctx.fillStyle = '#8aaabb';
  ctx.letterSpacing = '0px';
  ctx.textAlign = 'center';
  const maxW = W - PAD * 2.5;
  const words = r.desc.split(' ');
  let line = '', y = 420, lineH = 32;
  for (const word of words) {
    const test = line + (line ? ' ' : '') + word;
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, W / 2, y);
      line = word; y += lineH;
    } else { line = test; }
  }
  if (line) { ctx.fillText(line, W / 2, y); y += lineH; }

  // traits — wrap into two lines if needed
  y += 32;
  ctx.font = '300 14px sans-serif';
  ctx.fillStyle = '#2e4a5a';
  ctx.letterSpacing = '1.5px';
  const traitStr = r.traits.join('   ·   ');
  if (ctx.measureText(traitStr).width > W - PAD * 2) {
    const half = Math.ceil(r.traits.length / 2);
    const line1 = r.traits.slice(0, half).join('  ·  ');
    const line2 = r.traits.slice(half).join('  ·  ');
    ctx.fillText(line1, W / 2, y); y += 24;
    ctx.fillText(line2, W / 2, y); y += 24;
  } else {
    ctx.fillText(traitStr, W / 2, y); y += 24;
  }

  // watermark
  ctx.font = '300 15px sans-serif';
  ctx.fillStyle = '#4ecdc4';
  ctx.globalAlpha = 0.35;
  ctx.letterSpacing = '0.5px';
  ctx.fillText('✿  which lily are you?  ·  envyforyou.github.io/quiz/lily', W / 2, H - 44);
  ctx.globalAlpha = 1;

  // ── convert to blob and share ──
  canvas.toBlob(async (blob) => {
    const file = new File([blob], 'my-lily-result.png', { type: 'image/png' });

    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({
          files: [file],
          title: `i'm a ${r.name}`,
          text: `i got ${r.name} on the lily personality quiz ✿ — "${r.tagline}"\n\ntake it → ${window.location.href}`,
        });
      } catch (e) {
        if (e.name !== 'AbortError') fallbackDownload(canvas, r.name);
      }
    } else {
      fallbackDownload(canvas, r.name);
    }
  }, 'image/png');
}

function fallbackDownload(canvas, name) {
  const a = document.createElement('a');
  a.href = canvas.toDataURL('image/png');
  a.download = `${name.toLowerCase().replace(/ /g, '-')}-result.png`;
  a.click();
}

function restart() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  scores = { stargazer: 0, calla: 0, tiger: 0, white: 0, water: 0, spider: 0, valley: 0 };
  document.getElementById('result').classList.remove('show');
  document.getElementById('result').innerHTML = '';
  document.getElementById('questions').style.display = '';
  document.getElementById('progress-wrap').style.display = '';
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

render();
</script>
